<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Модель Навісу | PROJECT_X</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        /* Додаткові стилі суто для цієї сторінки */
        .model-container {
            width: 100%;
            height: calc(100vh - 80px); /* Висота екрану мінус навігація */
            margin-top: 80px;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        model-viewer {
            width: 90%;
            height: 90%;
            --poster-color: transparent;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 50px;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <nav class="nav-fixed">
        <div class="logo-text">PROJECT_X // 3D</div>
        <div class="nav-links">
            <a href="index.html">ГОЛОВНА</a>
            <a href="details.html">СПЕЦИФІКАЦІЯ</a>
            <a href="3dmodel.html" style="color: var(--primary);">3D МОДЕЛЬ</a>
        </div>
    </nav>

    <div class="model-container">
        <model-viewer 
            src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
            ios-src=""
            alt="3D модель металевого навісу"
            shadow-intensity="1"
            camera-controls
            auto-rotate
            ar>
        </model-viewer>
        
        <div class="controls-hint">Використовуйте мишу для обертання</div>
    </div>

</body>
</html>
